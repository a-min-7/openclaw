services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_CONFIG_PATH: /home/node/.config/openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.local/state/openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.0.13:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.config/openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.local/share/openclaw/workspace
      - ${OPENCLAW_STATE_DIR}:/home/node/.local/state/openclaw
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789"
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_CONFIG_PATH: /home/node/.config/openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.local/state/openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.0.13:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.config/openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.local/share/openclaw/workspace
      - ${OPENCLAW_STATE_DIR}:/home/node/.local/state/openclaw
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
    depends_on:
      - openclaw-gateway
